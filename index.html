<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChampsPath — Legal</title>
<style>
:root{--bg:#FAFAF5;--ink:#0F172A;--muted:#64748B;--accent:#10B981;--border:#E2E8F0}
*{box-sizing:border-box}
body{margin:0;font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);padding:48px 20px}
main{max-width:680px;margin:0 auto}
h1{font-size:32px;margin:0 0 8px;letter-spacing:-.5px}
p.lede{color:var(--muted);margin:0 0 32px}
ul.docs{list-style:none;padding:0;margin:0}
ul.docs li{border:1px solid var(--border);border-radius:14px;margin-bottom:12px;background:#fff;transition:border-color .15s}
ul.docs li:hover{border-color:var(--accent)}
ul.docs a{display:block;padding:18px 20px;color:var(--ink);text-decoration:none;font-weight:600}
ul.docs a small{display:block;color:var(--muted);font-weight:400;margin-top:4px}
footer{margin-top:48px;color:var(--muted);font-size:14px;text-align:center}
</style>
</head>
<body>
<main>
<h1>ChampsPath — Legal</h1>
<p class="lede">Privacy Policy and Terms of Service for the ChampsPath iOS app.</p>
<ul class="docs">
<li><a href="privacy.html">Privacy Policy<small>How we handle (and don't collect) your data</small></a></li>
<li><a href="terms.html">Terms of Service<small>License, disclaimers, and acceptable use</small></a></li>
</ul>
<footer>© 2026 ChampsPath · Unofficial fan app · Not affiliated with FIFA.</footer>
</main>
</body>
</html>
